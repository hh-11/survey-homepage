<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>問卷首頁</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      background: linear-gradient(135deg, #f4f7fb 0%, #eef2ff 100%);
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.10);
      padding: 40px 32px;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #e0e7ff;
      color: #3730a3;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 17px;
      line-height: 1.8;
      color: #4b5563;
      margin-bottom: 24px;
    }

    .section {
      background: #f9fafb;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 18px;
    }

    .section h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .section p, .section li {
      font-size: 15px;
      line-height: 1.8;
      color: #374151;
    }

    /* 🔥 只針對研究聯絡資訊去掉黑點與縮排 */
    .contact-list {
      list-style: none;
      padding-left: 0;
      margin: 0;
    }

    ul {
      margin: 0;
      padding-left: 20px;
    }

    .checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 20px 0 28px;
      font-size: 15px;
      line-height: 1.7;
    }

    .checkbox-row input {
      margin-top: 4px;
      transform: scale(1.2);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .primary-btn {
      background: #2563eb;
      color: white;
    }

    .status {
      margin-top: 18px;
      font-size: 14px;
      color: #1d4ed8;
      min-height: 22px;
    }

    .footer-note {
      margin-top: 24px;
      font-size: 13px;
      color: #6b7280;
      line-height: 1.7;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="badge">研究問卷</div>
    <h1>歡迎參與本研究</h1>

    <p class="subtitle">
      感謝您的熱心參與。本問卷為一項學術研究，目的在於了解使用者對 AI 健康助理資訊的評估與感受。
    </p>

    <section class="section">
      <h2>研究聯絡資訊</h2>
      <ul class="contact-list">
        <li>國立臺灣大學資訊管理系／國立中山大學資訊管理系</li>
        <li>指導教授：彭志宏 博士、李怡珍 博士</li>
        <li>研究生：孫煥煥、徐雅芝 敬上</li>
        <li>聯絡信箱：yclee@mis.nsysu.edu.tw</li>
      </ul>
    </section>

    <label class="checkbox-row">
      <input type="checkbox" id="consentCheckbox" />
      <span>我已閱讀上述說明，並同意參與本研究。</span>
    </label>

    <div class="button-row">
      <button id="startBtn" class="primary-btn" disabled>開始作答</button>
    </div>

    <div class="status" id="statusText"></div>

    <p class="footer-note">
      若您有任何問題，請聯繫研究團隊：yclee@mis.nsysu.edu.tw
    </p>
  </main>

  <script>
    const gasUrl = "你的 GAS URL";
    const consentCheckbox = document.getElementById("consentCheckbox");
    const startBtn = document.getElementById("startBtn");
    const statusText = document.getElementById("statusText");

    consentCheckbox.addEventListener("change", function () {
      startBtn.disabled = !this.checked;
    });

    startBtn.addEventListener("click", async function () {
      const response = await fetch(gasUrl);
      const data = await response.json();
      window.location.href = data.url;
    });
  </script>
</body>
</html>
